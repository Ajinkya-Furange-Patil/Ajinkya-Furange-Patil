<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <style>
    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 0.9; }
      100% { opacity: 0.3; }
    }
    @keyframes sweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes ping {
      0% { r: 2px; opacity: 1; }
      100% { r: 250px; opacity: 0; }
    }
    @keyframes glitch {
      0% { transform: translate(0) }
      20% { transform: translate(-2px, 2px) }
      40% { transform: translate(-2px, -2px) }
      60% { transform: translate(2px, 2px) }
      80% { transform: translate(2px, -2px) }
      100% { transform: translate(0) }
    }
    .grid-line { stroke: #39FF14; stroke-width: 0.5; opacity: 0.15; transition: opacity 0.3s; }
    .grid-line:hover { opacity: 0.45; }
    
    .radar-circle { stroke: #39FF14; stroke-width: 1; fill: none; opacity: 0.25; transition: stroke 0.3s, stroke-width 0.3s, opacity 0.3s; }
    .radar-circle:hover { stroke: #ffffff; stroke-width: 2; opacity: 0.8; cursor: crosshair; }
    
    .pulse-circle { stroke: #39FF14; stroke-width: 1.5; fill: none; transform-origin: 400px 150px; animation: ping 4s infinite linear; }
    
    .radar-sweep { fill: url(#radar-grad); transform-origin: 400px 150px; animation: sweep 6s infinite linear; transition: opacity 0.3s; pointer-events: visiblePainted; }
    .radar-sweep:hover { animation-duration: 1.5s; opacity: 0.6; fill: url(#radar-grad-hover); cursor: progress; }
    
    .node { fill: #39FF14; transition: fill 0.3s, r 0.3s, stroke-width 0.3s; animation: pulse 2s infinite ease-in-out; cursor: pointer; }
    .node:hover { fill: #ffffff; stroke: #39FF14; stroke-width: 2px; r: 8px; animation-play-state: paused; opacity: 1 !important; }
    
    .text-glow { font-family: 'Courier New', Courier, monospace; fill: #39FF14; font-size: 11px; letter-spacing: 2px; transition: fill 0.3s, text-shadow 0.3s; }
    .glitch-text { animation: glitch 4s infinite step-end; }
    
    /* Interactive Buttons */
    .interactive-btn { cursor: pointer; }
    .btn-bg { fill: #0d0d0d; stroke: #39FF14; stroke-width: 1; opacity: 0.7; transition: fill 0.3s, stroke-width 0.3s, opacity 0.3s; }
    
    .btn-left { transform-origin: 140px 250px; transition: transform 0.2s ease; }
    .btn-left:hover { transform: scale(1.05); }
    .btn-left:hover .btn-bg { fill: #39FF14; fill-opacity: 0.15; stroke-width: 1.5; opacity: 1; }
    .btn-left:hover .btn-text { fill: #ffffff; text-shadow: 0 0 5px #39FF14; }
    .btn-left:active { transform: scale(0.95); }
    
    .btn-right { transform-origin: 660px 250px; transition: transform 0.2s ease; }
    .btn-right:hover { transform: scale(1.05); }
    .btn-right:hover .btn-bg { fill: #39FF14; fill-opacity: 0.15; stroke-width: 1.5; opacity: 1; }
    .btn-right:hover .btn-text { fill: #ffffff; text-shadow: 0 0 5px #39FF14; }
    .btn-right:active { transform: scale(0.95); }
  </style>
  <defs>
    <radialGradient id="radar-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="90%" stop-color="#39FF14" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="radar-grad-hover" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="90%" stop-color="#39FF14" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#0d0d0d"/>

  <!-- Grid Pattern -->
  <g>
    <!-- Vertical Lines -->
    <line x1="50" y1="0" x2="50" y2="300" class="grid-line" />
    <line x1="100" y1="0" x2="100" y2="300" class="grid-line" />
    <line x1="150" y1="0" x2="150" y2="300" class="grid-line" />
    <line x1="200" y1="0" x2="200" y2="300" class="grid-line" />
    <line x1="250" y1="0" x2="250" y2="300" class="grid-line" />
    <line x1="300" y1="0" x2="300" y2="300" class="grid-line" />
    <line x1="350" y1="0" x2="350" y2="300" class="grid-line" />
    <line x1="400" y1="0" x2="400" y2="300" class="grid-line" />
    <line x1="450" y1="0" x2="450" y2="300" class="grid-line" />
    <line x1="500" y1="0" x2="500" y2="300" class="grid-line" />
    <line x1="550" y1="0" x2="550" y2="300" class="grid-line" />
    <line x1="600" y1="0" x2="600" y2="300" class="grid-line" />
    <line x1="650" y1="0" x2="650" y2="300" class="grid-line" />
    <line x1="700" y1="0" x2="700" y2="300" class="grid-line" />
    <line x1="750" y1="0" x2="750" y2="300" class="grid-line" />
    <!-- Horizontal Lines -->
    <line x1="0" y1="50" x2="800" y2="50" class="grid-line" />
    <line x1="0" y1="100" x2="800" y2="100" class="grid-line" />
    <line x1="0" y1="150" x2="800" y2="150" class="grid-line" />
    <line x1="0" y1="200" x2="800" y2="200" class="grid-line" />
    <line x1="0" y1="250" x2="800" y2="250" class="grid-line" />
  </g>

  <!-- Radar Circles -->
  <circle cx="400" cy="150" r="40" class="radar-circle"/>
  <circle cx="400" cy="150" r="80" class="radar-circle"/>
  <circle cx="400" cy="150" r="120" class="radar-circle"/>
  <circle cx="400" cy="150" r="120" class="pulse-circle" style="animation-delay: 0s;"/>
  <circle cx="400" cy="150" r="120" class="pulse-circle" style="animation-delay: 2s;"/>

  <!-- Radar Crosshairs -->
  <line x1="250" y1="150" x2="550" y2="150" stroke="#39FF14" stroke-width="0.5" opacity="0.4"/>
  <line x1="400" y1="10" x2="400" y2="290" stroke="#39FF14" stroke-width="0.5" opacity="0.4"/>

  <!-- Radar Sweep -->
  <path d="M 400 150 L 400 30 A 120 120 0 0 1 503.9 90 Z" class="radar-sweep"/>

  <!-- Target Nodes -->
  <circle cx="340" cy="100" r="4" class="node" style="animation-delay: 0.5s;"/>
  <circle cx="480" cy="180" r="3" class="node" style="animation-delay: 1.2s;"/>
  <circle cx="430" cy="80" r="5" class="node" style="animation-delay: 2.1s;"/>
  <circle cx="320" cy="200" r="3" class="node" style="animation-delay: 1.7s;"/>

  <!-- Coordinates & Data Displays -->
  <text x="30" y="40" class="text-glow glitch-text">SECURE LINK: ACTIVE</text>
  <text x="30" y="60" class="text-glow" opacity="0.6">SYS_INTEGRITY: 98.42%</text>
  <text x="30" y="80" class="text-glow" opacity="0.6">SCANNING FOR INTRUSIONS...</text>

  <text x="580" y="40" class="text-glow">AZIMUTH: 184.22°</text>
  <text x="580" y="60" class="text-glow" opacity="0.6">RANGE: 4200m</text>
  <text x="580" y="80" class="text-glow" opacity="0.6">NODES ONLINE: 14</text>

  <!-- Interactive Button Left -->
  <g class="interactive-btn btn-left">
    <rect x="30" y="230" width="220" height="40" class="btn-bg" rx="4"/>
    <text x="45" y="254" class="text-glow btn-text" font-weight="bold">THREAT LEVEL: NEUTRALIZED</text>
  </g>

  <!-- Interactive Button Right -->
  <g class="interactive-btn btn-right">
    <rect x="550" y="230" width="220" height="40" class="btn-bg" rx="4"/>
    <text x="575" y="254" class="text-glow btn-text" font-weight="bold">DECRYPT SYSTEM LOGS</text>
  </g>
</svg>
